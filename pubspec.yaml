name: study_vault
description: Offline-first study organizer
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.1.0
  webview_flutter: ^4.0.0
  hive: ^2.2.3
  share_plus: ^7.2.0
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  path: ^1.8.3
  file_picker: ^8.2.0
  open_file: ^3.5.11
  uuid: ^4.5.2
  video_player: ^2.5.1
  chewie: ^1.4.2
  photo_view: ^0.15.0
  syncfusion_flutter_pdf: ^31.1.19
  image: ^4.7.2
  video_thumbnail: ^0.5.0
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.9.0+3
  timezone: ^0.9.2
  flutter_timezone: ^5.0.1
  google_mlkit_text_recognition: ^0.15.0
  flutter_isolate: ^2.0.0
  collection: ^1.17.0
  archive: ^4.0.7
  pull_to_refresh: ^2.0.0
  image_picker: ^1.0.4
  permission_handler: ^11.0.1
  intl: ^0.20.2
  device_info_plus: ^10.1.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  provider: ^6.1.2
  package_info_plus: ^8.0.2
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.0.6
  shared_preferences: ^2.5.3
  flutter_sound: ^9.30.0
  scrollable_positioned_list: ^0.3.8
  http: ^1.6.0
  connectivity_plus: ^5.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2

  flutter_inappwebview: ^6.0.0
  flutter_markdown_community: ^0.7.7+2
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/lang/
    - assets/privacy_policy.txt
    - assets/terms_of_service.txt
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
